# Magento 2 / MageOS Version Compatibility Matrix
#
# This file is the single source of truth for what gets tested.
# Each product version carries a `baseline` block specifying the
# officially-recommended service set. Testing uses the baseline-deviation
# strategy: one run at the full baseline, plus one run per non-baseline
# option in each service dimension.
#
# Baselines sourced from:
#   Magento — https://experienceleague.adobe.com/en/docs/commerce-operations/installation-guide/system-requirements
#   MageOS  — https://mage-os.org/get-started/system-requirements

products:
  - name: magento
    package: magento/project-community-edition
    mirror: https://mage-os.hypernode.com/mirror/
    versions:
      - version: "2.4.9"
        baseline:
          php: "8.5"
          webserver: apache
          db: { type: mariadb, version: "11.4" }
          search: { type: opensearch, version: "3" }
          cache: { type: valkey, version: "8" }
          queue: { type: rabbitmq, version: "4.2" }
          varnish: "7.7"

