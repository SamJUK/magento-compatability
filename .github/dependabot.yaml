version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: '06:00'
      day: 'monday'
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns:
          - "*"
    assignees:
      - "SamJUK"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      time: '06:00'
      day: 'monday'
    cooldown:
      default-days: 7
    groups:
      all-docker:
        patterns:
          - "*"
    assignees:
      - "SamJUK"
