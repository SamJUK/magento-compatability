<VirtualHost *:80>
    ServerName magento.local

    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php-fpm:9000/var/www/html/pub/$1
    ProxyPassMatch ^/(pub/)(.*)$ !

    DocumentRoot /var/www/html/pub
    DirectoryIndex index.php

    <Directory "/var/www/html/pub">
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        # Magento front controller
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.php$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.php [L]
    </Directory>

    # Static files — long-lived cache headers
    <Directory "/var/www/html/pub/static">
        Header set Cache-Control "max-age=31536000, public"
        Header set X-Frame-Options SAMEORIGIN
    </Directory>

    # Media files
    <Directory "/var/www/html/pub/media">
        Header set Cache-Control "max-age=86400, public"
        Header set X-Frame-Options SAMEORIGIN
    </Directory>

    # Block sensitive paths
    <DirectoryMatch "^/var/www/html/(app|bin|dev|lib|setup|update|var)/">
        Require all denied
    </DirectoryMatch>

    <FilesMatch "\.(json|lock|xml)$">
        Require all denied
    </FilesMatch>

    ErrorLog /usr/local/apache2/logs/magento-error.log
    CustomLog /usr/local/apache2/logs/magento-access.log combined
</VirtualHost>
