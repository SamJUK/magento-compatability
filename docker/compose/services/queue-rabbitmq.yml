services:
  queue:
    image: "rabbitmq:${QUEUE_VERSION:-4.2}-alpine"
    environment:
      RABBITMQ_DEFAULT_USER: magento
      RABBITMQ_DEFAULT_PASS: magento
      RABBITMQ_DEFAULT_VHOST: /
    networks:
      - magento
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

networks:
  magento:
