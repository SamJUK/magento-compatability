upstream fastcgi_backend {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html/pub;
    index index.php;

    access_log /var/log/nginx/magento-access.log;
    error_log  /var/log/nginx/magento-error.log;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location /pub/ {
        location ~ ^/pub/media/(downloadable|customer|import|custom_options|theme_customization/.*\.xml) {
            deny all;
        }
        alias /var/www/html/pub/;
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /static/ {
        # Uncomment next line to serve versioned static files
        # location ~ ^/static/version\d*/(.*)$ { return 302 /static/$1; }
        expires max;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;
        expires 1y;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /media/customer/ { deny all; }
    location /media/downloadable/ { deny all; }
    location /media/import/ { deny all; }
    location /media/custom_options/ { deny all; }
    location /errors/ { try_files $uri =404; }

    location ~ ^/errors/.*\.(xml|phtml)$ { deny all; }

    location ~ [^/]\.php(/|$) {
        fastcgi_pass   fastcgi_backend;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  MAGE_RUN_CODE    default;
        fastcgi_param  MAGE_RUN_TYPE    store;
        include        fastcgi_params;

        fastcgi_connect_timeout     60s;
        fastcgi_read_timeout        1800s;
        fastcgi_send_timeout        1800s;
        fastcgi_buffer_size         64k;
        fastcgi_buffers             8 128k;
        fastcgi_busy_buffers_size   256k;
    }

    # Block access to sensitive files
    location ~ /\. { deny all; }
    location ~ ^/(app|bin|dev|lib|phpserver|setup|update|var)/ { return 404; }
    location ~ /(LICENSE|composer\.(json|lock))$ { return 404; }
    location ~ \.php$ { return 404; }
}
